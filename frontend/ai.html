<!DOCTYPE html>
<html lang="en">
<head>

  <title>AI Solutions - POLINEX</title>

</head>

<body>

  <header>
    <h1>POLINEX</h1>
    <div>
      <button onclick="window.location.href='index.html'">Dashboard</button>
      <button class="logout-btn" onclick="logout()">Logout</button>

  </header>

  <div class="ai-container">

    <div class="ai-card">
      <h3>Solutions</h3>
      <div id="ai-output">Click the button to generate solutions...</div>
    </div>

  </div>

  <script src="ai.js"></script>
